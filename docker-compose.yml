version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-local-testing-only-change-in-production
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - DB_ENGINE=django.db.backends.mysql
      - DB_NAME=clinic_db
      - DB_USER=root
      - DB_PASSWORD=Jenkins_13
      - DB_HOST=db
      - DB_PORT=3306
    depends_on:
      - db
    volumes:
      - .:/app
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=Jenkins_13
      - MYSQL_DATABASE=clinic_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
