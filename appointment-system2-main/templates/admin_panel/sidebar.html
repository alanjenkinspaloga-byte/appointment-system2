<!-- Admin Sidebar -->
<div class="list-group list-group-flush">
    <a href="{% url 'admin_dashboard' %}"
       class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}">
        <i class="bi bi-speedometer2 me-2"></i> Dashboard
    </a>
    <a href="{% url 'admin_doctors' %}"
       class="list-group-item list-group-item-action {% if 'admin_doctor' in request.resolver_match.url_name %}active{% endif %}">
        <i class="bi bi-person-badge me-2"></i> Manage Doctors
    </a>
    <a href="{% url 'admin_hospitals' %}"
       class="list-group-item list-group-item-action {% if 'admin_hospital' in request.resolver_match.url_name %}active{% endif %}">
        <i class="bi bi-hospital me-2"></i> Manage Hospitals
    </a>
    <a href="{% url 'admin_appointments' %}"
       class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'admin_appointments' %}active{% endif %}">
        <i class="bi bi-calendar-check me-2"></i> All Appointments
    </a>
    <a href="{% url 'admin_messages' %}"
       class="list-group-item list-group-item-action d-flex justify-content-between align-items-center {% if request.resolver_match.url_name == 'admin_messages' %}active{% endif %}">
        <span><i class="bi bi-chat-left-text me-2"></i> Messages</span>
        {% if unread_messages_count > 0 %}
            <span class="badge bg-warning text-dark rounded-pill">{{ unread_messages_count }}</span>
        {% endif %}
    </a>
    <a href="{% url 'notifications' %}"
       class="list-group-item list-group-item-action d-flex justify-content-between align-items-center {% if request.resolver_match.url_name == 'notifications' %}active{% endif %}">
        <span><i class="bi bi-bell me-2"></i> Notifications</span>
        {% if unread_notif_count > 0 %}
            <span class="badge bg-danger rounded-pill">{{ unread_notif_count }}</span>
        {% endif %}
    </a>
    <a href="{% url 'profile' %}"
       class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'profile' %}active{% endif %}">
        <i class="bi bi-person-circle me-2"></i> Profile
    </a>
</div>
