<!-- Patient Sidebar -->
<div class="list-group list-group-flush">
    <a href="{% url 'patient_dashboard' %}"
       class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'patient_dashboard' %}active{% endif %}">
        <i class="bi bi-speedometer2 me-2"></i> Dashboard
    </a>
    <a href="{% url 'category_select' %}"
       class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'category_select' %}active{% endif %}">
        <i class="bi bi-grid me-2"></i> Find a Doctor
    </a>
    <a href="{% url 'patient_appointments' %}"
       class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'patient_appointments' %}active{% endif %}">
        <i class="bi bi-journal-text me-2"></i> My Appointments
    </a>
    <a href="{% url 'symptom_search' %}"
       class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'symptom_search' %}active{% endif %}">
        <i class="bi bi-search me-2"></i> Symptom Search
    </a>
    <a href="{% url 'notifications' %}"
       class="list-group-item list-group-item-action d-flex justify-content-between align-items-center {% if request.resolver_match.url_name == 'notifications' %}active{% endif %}">
        <span><i class="bi bi-bell me-2"></i> Notifications</span>
        {% if unread_notif_count > 0 %}
            <span class="badge bg-danger rounded-pill">{{ unread_notif_count }}</span>
        {% endif %}
    </a>
    <a href="{% url 'profile' %}"
       class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'profile' %}active{% endif %}">
        <i class="bi bi-person-circle me-2"></i> Profile
    </a>
</div>
