{% extends 'base.html' %}
{% block title %}Password Reset Complete — OkiDoki{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4 text-center">
                    <div class="mb-3">
                        <i class="bi bi-check-circle-fill text-success" style="font-size:3rem;"></i>
                    </div>
                    <h3 class="mb-2">Password Reset Successful</h3>
                    <p class="text-muted mb-4">
                        Your password has been set. You can now log in with your new password.
                    </p>
                    <a href="{% url 'login' %}" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
